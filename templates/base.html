<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{% block title %} DevBoard {% endblock %}</title>
</head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">DEVBOARD</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        {% load i18n %}
                        <li class="nav-item">
                            <form action="{% url 'set_language' %}" method="post" class="d-inline">
                                {% csrf_token %}
                                <input name="next" type="hidden" value="{{ request.path }}">
                                <select name="language" class="form-select form-select-sm d-inline-block" style="width: auto;" onchange="this.form.submit()">
                                    {% get_current_language as LANGUAGE_CODE %}
                                    {% get_available_languages as LANGUAGES %}
                                    {% for lang_code, lang_name in LANGUAGES %}
                                        <option value="{{ lang_code }}"
                                            {% if lang_code == LANGUAGE_CODE %}selected{% endif %}>
                                            {{ lang_name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </form>
                        </li>
                        {% if user.is_authenticated %}
                            <li class="nav-item">
                                <span class="nav-link">{{ user.username }}</span>
                            </li>
                            <li class="nav-item">
                                <form action="{% url 'logout' %}" method="post">
                                    {% csrf_token %}
                                    <button class="btn btn-link nav-link" type="submit">Wyloguj</button>
                                </form>
                            </li>
                        {% else %}
                            <li class="nav-item">
                                <form action="{% url 'login' %}" method="get">
                                    <button class="btn btn-link nav-link" type="submit">Zaloguj</button>
                                </form>
                            </li>
                        {% endif %}
                    </ul>
                </div>
            </div>
        </nav>


        <!--     tu beda wstawiane strony, bo to bazowy widok tylko   -->
        <main class="container py-4">
            {% block content %}{% endblock %}
        </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
